services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quwwa
      POSTGRES_PASSWORD: quwwa
      POSTGRES_DB: quwwa
    ports:
      # Host port 5433 to avoid clashing with any local Postgres on 5432.
      - "5433:5432"
    volumes:
      - quwwa-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quwwa -d quwwa"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://quwwa:quwwa@db:5432/quwwa
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    profiles: ["full"]
    build: ./frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  quwwa-db-data:
